kind = "web"
previewPath = "/"
title = "Story Builder"
version = "1.0.0"
id = "artifacts/story-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26135

[services.development]
run = "pnpm --filter @workspace/story-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/story-app", "run", "build" ]
publicDir = "artifacts/story-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26135"
BASE_PATH = "/"
